<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style01.css">

    <style>
      p {
        background-color: green;
        color: white;
        font-size: 18px;
      } 

  
    </style>
    <title>Methods for Adding CSS</title>

  </head>

  <body>

    <!-- This is an example of the external method for adding CSS. The styles are located in the file "style01.css" and are applied to the div element below.-->
    <div>Style me via the external method!</div>

    <!-- This is an example of the internal method for adding CSS. The styles are located in the style tags in the head of this document and are applied to the p element below.-->   
    <p>I would like to be styled with the internal method, please.</p>

    <!-- This is an example of the inline method for adding CSS. The styles are located in the style attribute of the button element below.-->
    <button style="background-color: orange; font-size: 18px;">Inline Method</button>

  </body>
</html>
